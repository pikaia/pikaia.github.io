title: Lesser Known Singapore
description: Forgotten facts, obscure history, and overlooked people from Singapore's past and present.
theme: minima
minima:
  skin: dark
  social_links:
    github: pikaia

# Show latest posts on the homepage
show_excerpts: true

# Markdown settings
markdown: kramdown

# Permalink structure: /2026/07/18/post-title/
permalink: /:year/:month/:day/:title/

# Plugins (all supported natively by GitHub Pages, no build step needed)
plugins:
  - jekyll-feed
  - jekyll-sitemap

# SEO-ish basics
lang: en-SG

# Google Analytics (GA4) - minima's built-in include handles the gtag.js snippet
google_analytics: G-RPS2BGYR39

# Files that exist for repo/tooling purposes only, not part of the site
exclude:
  - CLAUDE.md
  - README.md
